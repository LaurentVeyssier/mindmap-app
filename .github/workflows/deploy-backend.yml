name: Build and Deploy Backend via Raw Docker

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**' # Triggers only if backend files change

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build, Tag, and Push Docker Image
        run: |
          # Ensure username is lowercase to prevent Docker errors
          LOWER_USER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          
          # Build using the backend folder context
          docker build -t ghcr.io/$LOWER_USER/mindmap-backend:${{ github.sha }} -t ghcr.io/$LOWER_USER/mindmap-backend:latest ./backend
          
          # Push both tags
          docker push ghcr.io/$LOWER_USER/mindmap-backend:${{ github.sha }}
          docker push ghcr.io/$LOWER_USER/mindmap-backend:latest

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Revision to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: mindmap-rg
          containerAppName: mindmap-backend
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/mindmap-backend:${{ github.sha }}
